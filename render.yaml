services:
  - type: web
    name: runova
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars: []
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
